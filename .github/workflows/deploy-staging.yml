name: Deploy - Staging (Develop)

on:
  push:
    branches: [develop]
    paths:
      - "api-gateway/**"
      - "user-service/**"
      - "question-service/**"
      - "collab-service/**"
      - "matching-service/**"
      - "frontend/**"
      - "Dockerfile*"
      - "docker-compose.yml"
      - ".github/workflows/deploy-staging.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          [
            api-gateway,
            user-service,
            question-service,
            collab-service,
            matching-service,
            frontend,
          ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=raw,value=develop
            type=sha,prefix={{branch}}-

      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-staging:
    runs-on: ubuntu-latest
    needs: build-and-push-staging
    if: success()

    steps:
      - name: Notify deployment success
        run: |
          echo "✅ Staging deployment successful!"
          echo "📦 Images pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-<service>:develop"
          echo "🔗 View images: https://github.com/users/${{ github.actor }}/packages"

      - name: Print deployment info
        run: |
          echo "════════════════════════════════════════"
          echo "📤 STAGING DEPLOYMENT COMPLETE"
          echo "════════════════════════════════════════"
          echo "Branch: develop"
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Repository: ${{ env.IMAGE_NAME }}"
          echo "Services: api-gateway, user-service, question-service, collab-service, matching-service, frontend"
          echo "Tag: develop"
          echo "════════════════════════════════════════"
