name: CI - PR Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "api-gateway/**"
      - "user-service/**"
      - "question-service/**"
      - "collab-service/**"
      - "matching-service/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"
      - "docker-compose.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Services

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Lint Backend Services
        run: |
          for service in api-gateway user-service question-service collab-service matching-service; do
            if [ -f "$service/package.json" ]; then
              echo "Linting $service..."
              cd "$service"
              npm ci --omit=dev 2>/dev/null || npm ci
              if npm run | grep -q "lint"; then
                npm run lint || echo "Linting issues in $service (non-blocking)"
              fi
              cd ..
            fi
          done

      - name: Lint Frontend
        working-directory: ./frontend
        run: |
          npm ci
          if npm run | grep -q "lint"; then
            npm run lint || echo "Linting issues in frontend (non-blocking)"
          fi

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    strategy:
      matrix:
        service: [user-service, question-service]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./${{ matrix.service }}/package-lock.json"

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: npm test

  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests (Docker Compose)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Docker Compose services
        run: |
          docker compose up -d
          echo "⏳ Waiting for services to be healthy..."
          sleep 30

      - name: Check service health
        run: |
          echo "🔍 Checking service health..."
          for i in {1..5}; do
            echo "Attempt $i/5..."
            if docker compose ps | grep -E "healthy|running"; then
              echo "✅ Services are running"
              docker compose ps
              exit 0
            fi
            sleep 10
          done
          echo "❌ Services failed to start"
          docker compose logs
          exit 1

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests..."
          if command -v curl &> /dev/null; then
            curl -f http://localhost:3000 || echo "API Gateway check skipped"
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "📋 Docker Compose logs:"
          docker compose logs
          echo "📋 Docker Compose ps:"
          docker compose ps

      - name: Cleanup
        if: always()
        run: docker compose down -v
