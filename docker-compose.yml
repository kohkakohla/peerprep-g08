services:
  redis:
    image: redis:alpine
    container_name: peerprep-redis
    ports:
      - "6379:6379"
    networks:
      - peerprep-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  matching-service:
    build: ./matching-service
    container_name: matching-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
    - ./matching-service:/usr/src/app
    - /user/src/app/node_modules
    depends_on:
      redis :
        condition: service_healthy
    networks:
      - peerprep-network

networks:
  peerprep-network:
    driver: bridge
